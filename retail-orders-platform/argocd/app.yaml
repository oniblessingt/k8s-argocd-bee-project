apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: <your-github-repo>
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: retail-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true