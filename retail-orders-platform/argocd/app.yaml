apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oniblessingt/k8s-argocd-bee-project.git
    targetRevision: main
    path: retail-orders-platform/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: retail-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true